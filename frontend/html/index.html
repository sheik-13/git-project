<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Three Tier App</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: #ffffff;
            width: 450px;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        h1 { margin-top: 0; color: #333; }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        button {
            background-color: #667eea; color: white; border: none;
            padding: 10px 15px; font-size: 14px; border-radius: 6px;
            cursor: pointer; transition: background-color 0.3s ease;
        }
        button:hover { background-color: #5a67d8; }

        .btn-edit { background-color: #f6ad55; padding: 6px 12px; font-size: 12px; }
        .btn-edit:hover { background-color: #dd6b20; }
        .btn-refresh { width: 100%; background-color: #718096; margin-bottom: 10px;}

        ul {
            list-style: none; padding: 0; margin-top: 10px;
            text-align: left; max-height: 250px; overflow-y: auto;
        }

        li {
            background: #f4f6fb; padding: 10px; margin-bottom: 8px;
            border-radius: 6px; color: #333;
            display: flex; justify-content: space-between; align-items: center;
        }

        .footer { margin-top: 15px; font-size: 12px; color: #777; }
    </style>
</head>

<body>
    <div class="card">
        <h1>Three Tier Application</h1>
        
        <div class="input-group">
            <input type="text" id="newUserName" placeholder="Enter new user name...">
            <button onclick="addUser()">Add User</button>
        </div>

        <button class="btn-refresh" onclick="loadUsers()">Refresh List</button>

        <ul id="users"></ul>

        <div class="footer">
            Docker • Nginx • Flask • PostgreSQL
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
